<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>资料栈 · 资料分享平台</title>
<link rel="icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;background:#08090A;color:#D0D6E0;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
.theme-light body{background:#FAFBFC;color:#31302E}
a{color:inherit;text-decoration:none}

/* ====== NAV ====== */
.navbar{position:sticky;top:0;z-index:100;background:rgba(8,9,10,.88);border-bottom:1px solid rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.theme-light .navbar{background:rgba(250,251,252,.88);border-color:rgba(0,0,0,.08)}
.navbar-inner{width:min(1200px,calc(100vw - 48px));margin:0 auto;min-height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:700;color:#F7F8F8;letter-spacing:-.3px}
.theme-light .logo{color:#1A1A1A}
.logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#60A5FA);display:grid;place-items:center;box-shadow:0 8px 24px rgba(59,130,246,.28)}
.logo-icon svg{width:24px;height:24px}
.theme-btn{width:48px;height:28px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);position:relative;flex-shrink:0;cursor:pointer}
.theme-light .theme-btn{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1)}
.theme-link{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:inherit;z-index:2;font-size:14px}
.to-light{display:none}.to-dark{display:none}
.theme-dark .to-light{display:flex}.theme-light .to-dark{display:flex}
.theme-knob{position:absolute;top:3px;left:3px;z-index:1;width:22px;height:22px;border-radius:50%;background:#3B82F6;transition:left .28s cubic-bezier(.4,0,.2,1)}
.theme-light .theme-knob{left:23px}

/* ====== HERO ====== */
.hero{position:relative;padding:120px 24px 100px;text-align:center;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(59,130,246,.08),transparent 60%),radial-gradient(ellipse 60% 50% at 80% 60%,rgba(96,165,250,.04),transparent 50%);pointer-events:none}
.hero-content{position:relative;z-index:1;max-width:800px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:999px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.15);color:#60A5FA;font-size:13px;font-weight:500;margin-bottom:32px;letter-spacing:.3px}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:#3B82F6;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero h1{font-size:clamp(40px,6vw,68px);line-height:1.06;font-weight:800;letter-spacing:-1.2px;color:#F7F8F8;margin-bottom:20px}
.theme-light .hero h1{color:#0F172A}
.hero h1 em{font-style:normal;background:linear-gradient(135deg,#3B82F6,#818CF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:clamp(16px,2vw,20px);color:#8A8F98;font-weight:400;line-height:1.7;max-width:560px;margin:0 auto 40px}
.theme-light .hero p{color:#615D59}
.hero-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:8px;background:#3B82F6;color:#FFF;font-size:15px;font-weight:600;border:none;letter-spacing:-.1px;box-shadow:0 4px 16px rgba(59,130,246,.3),0 0 0 1px rgba(59,130,246,.2);transition:all .2s}
.btn-primary:hover{background:#2563EB;box-shadow:0 8px 24px rgba(59,130,246,.4);transform:translateY(-1px)}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:#D0D6E0;font-size:15px;font-weight:500;transition:all .2s}
.btn-ghost:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14)}
.theme-light .btn-ghost{background:rgba(0,0,0,.02);border-color:rgba(0,0,0,.08);color:#31302E}
.theme-light .btn-ghost:hover{background:rgba(0,0,0,.04)}

/* ====== STATS BAR ====== */
.stats-bar{display:flex;justify-content:center;gap:48px;padding:0 24px 80px;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-num{font-size:36px;font-weight:800;color:#F7F8F8;letter-spacing:-.5px;line-height:1.1}
.theme-light .stat-num{color:#0F172A}
.stat-num span{background:linear-gradient(135deg,#3B82F6,#60A5FA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:13px;color:#62666D;font-weight:500;margin-top:6px;letter-spacing:.2px}

/* ====== CATEGORIES ====== */
.cats-section{padding:0 24px 80px}
.cats-inner{max-width:1100px;margin:0 auto}
.cats-title{font-size:13px;font-weight:600;color:#62666D;text-transform:uppercase;letter-spacing:2px;margin-bottom:28px;text-align:center}
.cats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.cat-card{position:relative;display:flex;align-items:center;gap:16px;padding:20px 24px;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);transition:all .25s;overflow:hidden}
.cat-card::before{content:'';position:absolute;inset:0;border-radius:12px;background:radial-gradient(600px circle at var(--mx,50%) var(--my,50%),rgba(59,130,246,.06),transparent 40%);opacity:0;transition:opacity .4s}
.cat-card:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.04)}
.cat-card:hover::before{opacity:1}
.theme-light .cat-card{background:#FFF;border-color:rgba(0,0,0,.06);box-shadow:rgba(0,0,0,.02) 0px 4px 18px,rgba(0,0,0,.01) 0px 2px 8px,rgba(0,0,0,.01) 0px 1px 3px}
.theme-light .cat-card:hover{box-shadow:rgba(0,0,0,.05) 0px 8px 32px,rgba(0,0,0,.02) 0px 4px 12px;border-color:rgba(59,130,246,.2)}
.cat-card.is-empty{opacity:.4;pointer-events:none}
.cat-icon{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;font-size:26px;flex-shrink:0;background:rgba(255,255,255,.04)}
.theme-light .cat-icon{background:#F1F5F9}
.cat-info{min-width:0}
.cat-name{font-size:16px;font-weight:600;color:#F7F8F8;margin-bottom:4px}
.theme-light .cat-name{color:#0F172A}
.cat-count{font-size:13px;color:#62666D;font-weight:500}
.cat-arrow{color:#62666D;font-size:18px;flex-shrink:0;transition:transform .25s}
.cat-card:hover .cat-arrow{transform:translateX(4px);color:#3B82F6}

/* ====== FOOTER ====== */
.footer{margin-top:40px;padding:48px 24px 32px;border-top:1px solid rgba(255,255,255,.06);color:#62666D;font-size:13px}
.theme-light .footer{border-color:rgba(0,0,0,.06);color:#615D59}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.footer-links{display:flex;gap:24px}
.footer-links a{transition:color .2s}
.footer-links a:hover{color:#3B82F6}
.reveal{opacity:0;transform:translateY(20px);transition:opacity .5s ease-out,transform .5s ease-out}.reveal.visible{opacity:1;transform:translateY(0)}@media(prefers-reduced-motion){.reveal{opacity:1;transform:none;transition:none}}</style>
</head>
<body class="theme-dark">

  <div class="navbar-inner">
    <a href="/" class="logo">
      <span class="logo-icon">
        <svg viewBox="0 0 48 48"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#F7D08A"/><stop offset="50%" stop-color="#D9A441"/><stop offset="100%" stop-color="#8D5A2A"/></linearGradient></defs><path d="M17 9h14l3 6H14l3-6Z" fill="url(#bg)" stroke="#FFF" stroke-width="1.5" stroke-linejoin="round" opacity=".9"/><path d="M15 15h18v5H15z" fill="url(#bg)" stroke="#FFF" stroke-width="1.4" stroke-linejoin="round" opacity=".9"/><path d="M14 19h20v8c0 4.6-3.4 8-8 8h-4c-4.6 0-8-3.4-8-8v-8Z" fill="url(#bg)" stroke="#FFF" stroke-width="1.7" stroke-linejoin="round" opacity=".9"/><path d="M18 35h12l-1.8 3.5H19.8L18 35Z" fill="url(#bg)" stroke="#FFF" stroke-width="1.4" stroke-linejoin="round" opacity=".9"/><path d="M24 4v3" fill="none" stroke="#FFF" stroke-width="1.6" stroke-linecap="round" opacity=".9"/><circle cx="24" cy="24" r="2.1" fill="#F7D08A" stroke="#FFF" stroke-width=".8" opacity=".9"/></svg>
      </span>
      资料栈

    <div class="theme-btn" id="themeBtn">

      <a class="theme-link to-dark" href="/theme?set=dark">🌙</a>
      <span class="theme-knob"></span>

  </div>
</nav>

<section class="hero">
  <div class="hero-content">
    <div class="hero-badge"><span class="hero-badge-dot"></span>2008-2025 高考真题已上线</div>

</section>

<section class="stats-bar">
  <div class="stat-item"><div class="stat-num"><span>2551</span></div><div class="stat-label">高考真题</div></div>
  <div class="stat-item"><div class="stat-num"><span>17</span></div><div class="stat-label">年份覆盖</div></div>
  <div class="stat-item"><div class="stat-num"><span>1</span></div><div class="stat-label">历史文物</div></div>

<script>
/* === Cat card hover gradient === */
(function(){
  var cards = document.querySelectorAll('.cat-card:not(.is-empty)');
  for (var i = 0; i < cards.length; i++) {
    cards[i].addEventListener('mousemove', function(e) {
      var rect = this.getBoundingClientRect();
      var x = ((e.clientX - rect.left) / rect.width) * 100;
      var y = ((e.clientY - rect.top) / rect.height) * 100;
      this.style.setProperty('--mx', x + '%');
      this.style.setProperty('--my', y + '%');
    });
  }
})();
</script>

<script>(function(){var h=document.documentElement;var c=document.cookie.replace(/(?:(?:^|.*;\s*)theme\s*\=\s*([^;]*).*$)|^.*$/,"$1");if(c==="light")h.className="theme-light";var b=document.getElementById("themeBtn");if(!b)return;b.onclick=function(e){e=e||window.event;e.preventDefault();var isDark=h.className.indexOf("theme-light")<0;if(isDark){h.className="theme-light";document.cookie="theme=light;path=/;max-age=31536000"}else{h.className="theme-dark";document.cookie="theme=dark;path=/;max-age=31536000"}};})();</script>
</body>
