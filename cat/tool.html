<!DOCTYPE html>
<html lang="zh-CN" class="<!--# if expr="$cookie_theme = light" -->theme-light<!--# else -->theme-dark<!--# endif -->">

<title>工具软件 - 资料栈</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;background:#0F172A;color:#F1F5F9;line-height:1.6;min-height:100vh}
.theme-light body{background:#F8FAFC;color:#111827}
a{color:inherit}
.navbar{position:sticky;top:0;z-index:100;background:rgba(15,23,42,.92);border-bottom:1px solid #334155;backdrop-filter:blur(16px)}
.theme-light .navbar{background:rgba(255,255,255,.9);border-color:#E5E7EB}
.navbar-inner,.wrap,.footer-inner{width:min(1280px,calc(100vw - 32px));margin:0 auto}
.navbar-inner{min-height:68px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{text-decoration:none;display:flex;align-items:center;gap:12px;color:#3B82F6;font-size:28px;font-weight:800;letter-spacing:-.4px}
.logo-icon{width:46px;height:46px;border-radius:14px;flex-shrink:0;display:grid;place-items:center;background:linear-gradient(135deg,#4F8DFF,#7CC6FF);box-shadow:0 10px 28px rgba(59,130,246,.24)}
.logo-icon svg{width:30px;height:30px;display:block}
.theme-btn{width:52px;height:30px;border-radius:999px;background:#334155;border:1.5px solid #475569;position:relative;overflow:hidden;flex-shrink:0}
.theme-light .theme-btn{background:#CBD5E1;border-color:#94A3B8}
.theme-link{position:absolute;inset:0;display:flex;align-items:center;text-decoration:none;color:inherit;z-index:2}
.to-light{justify-content:flex-start;padding-left:8px}
.to-dark{justify-content:flex-end;padding-right:8px}
.theme-dark .to-dark{display:none}
.theme-light .to-light{display:none}
.theme-knob{position:absolute;top:3px;left:3px;z-index:1;width:22px;height:22px;border-radius:50%;background:#E2E8F0;pointer-events:none;transition:left .28s ease;box-shadow:0 2px 8px rgba(15,23,42,.25)}
.theme-light .theme-knob{left:25px;background:#FBBF24}
.footer{margin-top:56px;padding:42px 16px 30px;background:#1E293B;border-top:1px solid #334155;color:#94A3B8}
.theme-light .footer{background:#F8FAFC;border-color:#E5E7EB;color:#64748B}
.footer-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:32px;margin-bottom:30px}
.footer-col h4{font-size:15px;font-weight:800;color:#F8FAFC;margin-bottom:16px}
.theme-light .footer-col h4{color:#111827}
.footer-col ul{list-style:none}
.footer-col li+li{margin-top:10px}
.footer-col a{text-decoration:none}
.footer-col a:hover{color:#60A5FA}
.footer-contact{display:flex;flex-direction:column;gap:12px}
.footer-contact .email{color:#60A5FA;text-decoration:none}
.footer-contact .qr{width:84px;height:84px;border-radius:10px;border:1px solid #334155}
.footer-bottom{padding-top:22px;border-top:1px solid #334155;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.theme-light .footer-bottom{border-color:#E5E7EB}
.footer-links{display:flex;gap:16px;flex-wrap:wrap}
.page-hero{padding:42px 16px 24px;background:linear-gradient(135deg,#111827 0%,#1E293B 52%,#334155 100%)}
.theme-light .page-hero{background:linear-gradient(135deg,#EFF6FF 0%,#DBEAFE 55%,#BFDBFE 100%)}
.breadcrumbs{color:#94A3B8;font-size:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.breadcrumbs a{color:#60A5FA;text-decoration:none}
.page-title{margin-top:14px;font-size:clamp(30px,4vw,48px);font-weight:900}
.page-desc{margin-top:10px;color:#94A3B8;font-size:16px}
.wrap{padding:28px 0 0}
.section-title{font-size:22px;font-weight:800;margin:0 0 16px}
.sub-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:28px}
.sub-card{display:block;padding:22px;border-radius:22px;background:#1E293B;border:1px solid #334155;text-decoration:none;transition:transform .22s,border-color .22s,box-shadow .22s}
.theme-light .sub-card{background:#fff;border-color:#E5E7EB}
.sub-card:hover{transform:translateY(-3px);border-color:#60A5FA;box-shadow:0 18px 44px rgba(15,23,42,.18)}
.sub-icon{font-size:34px;margin-bottom:10px}
.sub-name{font-size:18px;font-weight:800}
.sub-desc{margin-top:8px;color:#94A3B8;font-size:14px}
.theme-light .sub-desc{color:#6B7280}
.file-panel{background:#111827;border:1px solid #334155;border-radius:22px;overflow:hidden}
.theme-light .file-panel{background:#fff;border-color:#E5E7EB}
.file-item{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:14px;padding:16px 18px;border-bottom:1px solid #334155;align-items:center}
.theme-light .file-item{border-color:#E5E7EB}
.file-item:last-child{border-bottom:none}
.file-item:nth-child(odd){background:rgba(255,255,255,.02)}
.theme-light .file-item:nth-child(odd){background:#F8FAFC}
.file-name a{text-decoration:none;word-break:break-word}
.file-name a:hover{color:#60A5FA}
.file-meta{font-size:13px;color:#94A3B8;white-space:nowrap}
.theme-light .file-meta{color:#6B7280}
.empty{padding:34px 18px;color:#94A3B8;text-align:center}
.theme-light .empty{color:#6B7280}
.chip-nav{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 24px}
.chip{padding:8px 14px;border-radius:999px;text-decoration:none;background:#1E293B;border:1px solid #334155;font-size:14px}
.theme-light .chip{background:#fff;border-color:#E5E7EB}
.chip.active{background:#3B82F6;border-color:#3B82F6;color:#fff}
@media(max-width:768px){
  .navbar-inner,.wrap,.footer-inner{width:min(100%,calc(100vw - 24px))}
  .logo{font-size:24px}
  .footer-grid{grid-template-columns:1fr}
  .file-item{grid-template-columns:1fr;gap:8px}
}
@media(max-width:480px){
  .navbar-inner,.wrap,.footer-inner{width:min(100%,calc(100vw - 20px))}
  .logo{font-size:22px}
  .logo-icon{width:42px;height:42px}
}
</style>
</head>
